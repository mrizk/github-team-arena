<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Team Arena</title>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface-hover: #1a2235;
    --border: #1e293b;
    --border-light: #334155;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --text-dim: #64748b;
    --accent: #38bdf8;
    --accent-glow: rgba(56,189,248,0.15);
    --gold: #fbbf24;
    --gold-glow: rgba(251,191,36,0.2);
    --green: #34d399;
    --green-glow: rgba(52,211,153,0.15);
    --purple: #a78bfa;
    --purple-glow: rgba(167,139,250,0.15);
    --red: #f87171;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', 'JetBrains Mono', 'Fira Code', monospace;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slideIn { from{transform:translateX(100%)} to{transform:translateX(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  input, button { font-family: inherit; }
  input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; width: 100%;
  }
  input:focus { border-color: var(--accent); }

  .setup-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .setup-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 40px; max-width: 480px; width: 100%; text-align: center;
  }
  .setup-box h1 { font-size: 22px; font-weight: 800; margin: 12px 0 4px; letter-spacing: -0.02em; }
  .setup-box .subtitle { color: var(--text-muted); font-size: 13px; margin-bottom: 28px; }
  .setup-box .trophy { font-size: 48px; animation: float 3s ease-in-out infinite; }
  .form-group { display: flex; flex-direction: column; gap: 12px; text-align: left; }
  .form-label { font-size: 12px; color: var(--text-dim); font-weight: 600; }
  .form-label span { font-weight: 400; }
  .days-row { display: flex; gap: 6px; }
  .day-btn {
    flex: 1; padding: 8px 0; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); font-weight: 700; font-size: 13px; cursor: pointer;
  }
  .day-btn.active { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); }
  .launch-btn {
    margin-top: 8px; padding: 12px 0; border-radius: 10px; border: none; width: 100%;
    background: linear-gradient(135deg, var(--accent), #818cf8);
    color: #fff; font-weight: 800; font-size: 15px; cursor: pointer; letter-spacing: -0.01em;
  }
  .launch-btn:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }
  .footnote { font-size: 11px; color: var(--text-dim); margin-top: 16px; }
  .error-box {
    background: rgba(248,113,113,0.1); border: 1px solid var(--red); border-radius: 10px;
    padding: 12px; margin-bottom: 16px; font-size: 13px; color: var(--red);
  }

  .dashboard { max-width: 960px; margin: 0 auto; padding: 20px 16px 40px; }
  .dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .dash-header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
  .dash-header .sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .back-btn {
    padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); font-size: 12px; cursor: pointer; font-weight: 600;
  }
  .back-btn:hover { background: var(--surface-hover); color: var(--text); }
  .back-btn.anon-active { background: var(--purple-glow); color: var(--purple); border-color: var(--purple); }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .warning-banner {
    background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.35); border-radius: 10px;
    padding: 10px 14px; margin-bottom: 16px; font-size: 12px; color: var(--gold);
  }
  .warning-banner ul { margin: 0; padding-left: 18px; }
  .warning-banner .warn-title { font-weight: 700; margin-bottom: 4px; }

  .stats-ribbon { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-badge {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 18px; flex: 1 1 140px; min-width: 140px; text-align: center;
  }
  .stat-badge .icon { font-size: 20px; }
  .stat-badge .val { font-size: 28px; font-weight: 800; line-height: 1.1; margin-top: 4px; }
  .stat-badge .lbl { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  .tabs {
    display: flex; gap: 4px; background: var(--surface); border-radius: 10px;
    padding: 3px; border: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap;
  }
  .tab-btn {
    padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
    font-weight: 600; font-size: 13px; transition: all 0.2s;
    background: transparent; color: var(--text-muted);
  }
  .tab-btn.active { background: var(--accent); color: var(--bg); }

  .leaders-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  .leader-section h3 { font-size: 14px; font-weight: 700; margin: 0 0 10px; display: flex; align-items: center; gap: 6px; }

  .leader-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 16px 20px; display: flex; align-items: center; gap: 14px;
    transition: transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden; cursor: pointer;
  }
  .leader-card:hover { transform: translateY(-2px); }
  .leader-card.top { border-color: var(--card-color); }
  .leader-card .rank { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
  .leader-card .info { flex: 1; min-width: 0; }
  .leader-card .name { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 6px; }
  .leader-card.top .name { font-size: 16px; }
  .leader-card .detail { font-size: 12px; color: var(--text-muted); }
  .leader-card .score { text-align: right; flex-shrink: 0; }
  .leader-card .score .num { font-size: 22px; font-weight: 800; line-height: 1; }
  .leader-card.top .score .num { font-size: 26px; }
  .leader-card .score .unit { font-size: 11px; color: var(--text-dim); }

  .avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; object-fit: cover; }
  .avatar.lg { width: 44px; height: 44px; }
  .avatar-fallback {
    display: flex; align-items: center; justify-content: center; border-radius: 50%;
    font-weight: 700; color: #fff; flex-shrink: 0;
  }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { padding: 8px 6px; color: var(--text-dim); border-bottom: 1px solid var(--border); font-weight: 600; font-size: 10px; white-space: nowrap; }
  th:first-child { text-align: left; padding-left: 10px; position: sticky; left: 0; background: var(--bg); z-index: 1; }
  td { padding: 6px; text-align: center; border-bottom: 1px solid var(--border); }
  td:first-child { text-align: left; padding-left: 10px; position: sticky; left: 0; background: var(--bg); z-index: 1; }
  .user-cell { display: flex; align-items: center; gap: 6px; }
  .user-cell img, .user-cell .avatar-fallback { width: 22px; height: 22px; font-size: 10px; }
  .user-cell span { font-weight: 600; }
  .total-col { font-weight: 800; color: var(--gold); }
  td.clickable { cursor: pointer; border-radius: 4px; transition: outline 0.15s; }
  td.clickable:hover { outline: 1.5px solid var(--border-light); }

  .bar-chart { display: flex; flex-direction: column; gap: 4px; margin-bottom: 24px; }
  .bar-row { display: flex; align-items: center; gap: 8px; }
  .bar-label { width: 140px; font-size: 11px; color: var(--text-muted); text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-track { flex: 1; background: var(--border); border-radius: 4px; height: 22px; position: relative; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
  .bar-val { position: absolute; right: 6px; top: 3px; font-size: 11px; font-weight: 600; }

  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 60px auto;
  }
  .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
  .loading-wrap p { color: var(--text-muted); font-size: 13px; margin-top: 16px; }
  .empty { color: var(--text-dim); font-size: 13px; }

  /* Drawer */
  .drawer-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 100;
    animation: fadeIn 0.2s ease-out;
  }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: min(540px, 92vw);
    background: var(--surface); border-left: 1px solid var(--border);
    z-index: 101; overflow-y: auto; animation: slideIn 0.25s ease-out;
    padding: 24px;
  }
  .drawer-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
  }
  .drawer-header h2 { font-size: 15px; font-weight: 800; }
  .drawer-close {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .drawer-close:hover { background: var(--surface-hover); }

  .commit-item, .review-item, .pr-item {
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .commit-item:last-child, .review-item:last-child, .pr-item:last-child { border-bottom: none; }
  .item-title {
    font-size: 13px; font-weight: 600; color: var(--text);
    display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap;
  }
  .item-title a { color: var(--accent); text-decoration: none; word-break: break-word; }
  .item-title a:hover { text-decoration: underline; }
  .item-sha { color: var(--text-dim); font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .item-meta { font-size: 11px; color: var(--text-dim); margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .branch-tag {
    background: var(--accent-glow); color: var(--accent); padding: 1px 6px;
    border-radius: 4px; font-size: 10px; font-weight: 600;
  }
  .item-body {
    font-size: 12px; color: var(--text-muted); margin-top: 6px;
    max-height: 80px; overflow: hidden; text-overflow: ellipsis; line-height: 1.5;
    white-space: pre-wrap; word-break: break-word;
  }
  .pr-state {
    display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 700;
  }
  .pr-state.merged { background: var(--purple-glow); color: var(--purple); }
  .drawer-empty { color: var(--text-dim); font-size: 13px; padding: 20px 0; text-align: center; }
  .drawer-count { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }
</style>
</head>
<body>

<div id="app"></div>
<div id="drawer-root"></div>

<script>
const $ = (sel, ctx = document) => ctx.querySelector(sel);
const el = (tag, attrs = {}, ...children) => {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') e.className = v;
    else if (k === 'innerHTML') e.innerHTML = v;
    else if (k === 'href') { e.setAttribute('href', v); e.setAttribute('target', '_blank'); e.setAttribute('rel', 'noopener'); }
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  }
  return e;
};

const MEDAL = ['🥇','🥈','🥉'];
const FIRE = { commits: 5, reviews: 3 };
const DEFAULT_EXCLUDE_PREFIXES = 'staging/';

const ANON_NAMES = [
  'Adventurous Alpaca','Bouncing Beaver','Clever Cucumber','Daring Dolphin',
  'Eager Eagle','Fearless Falcon','Gallant Giraffe','Happy Hedgehog',
  'Inventive Ibis','Jolly Jellyfish','Kind Koala','Lively Lemur',
  'Mighty Mango','Nimble Narwhal','Optimistic Octopus','Peppy Penguin',
  'Quirky Quokka','Radiant Raccoon','Sneaky Sloth','Tactical Toucan',
  'Unstoppable Unicorn','Vivid Vulture','Wacky Walrus','Xenial Xerus',
  'Yodeling Yak','Zealous Zebra','Aspiring Antelope','Brave Badger',
  'Cheerful Chinchilla','Dapper Donkey','Energetic Echidna','Fancy Ferret',
  'Glowing Gecko','Hilarious Hamster','Iconic Iguana','Jubilant Jackal',
  'Keen Kangaroo','Loyal Llama','Magical Meerkat','Noble Newt',
  'Outgoing Otter','Plucky Panda','Quaint Quail','Rapid Rabbit',
  'Sleek Seal','Trusty Turtle','Upbeat Urchin','Valiant Viper',
  'Wise Wombat','Young Yeti',
];

function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function buildAnonMap(logins) {
  const map = {};
  const ordered = [...logins].sort((a, b) => hashStr(a) - hashStr(b) || a.localeCompare(b));
  ordered.forEach((login, i) => {
    const base = ANON_NAMES[i % ANON_NAMES.length];
    const round = Math.floor(i / ANON_NAMES.length);
    map[login] = round === 0 ? base : `${base} ${round + 1}`;
  });
  return map;
}

function displayName(login) {
  if (!state.anonymized || !login) return login;
  return state.anonMap[login] || login;
}

const ALLOWED_DAYS = [7, 14, 30, 60];

function getInitialConfig() {
  const url = new URLSearchParams(window.location.search);

  const repo = url.get('repo') ?? '';

  const daysParam = Number(url.get('days'));
  const days = ALLOWED_DAYS.includes(daysParam) ? daysParam : 14;

  const excludeFromUrl = url.get('exclude');
  const excludePrefixes = excludeFromUrl != null
    ? excludeFromUrl
    : (localStorage.getItem('arena_exclude_prefixes') ?? DEFAULT_EXCLUDE_PREFIXES);

  return { repo, days, excludePrefixes };
}

function syncUrl() {
  const url = new URL(window.location.href);
  const set = (k, v, def) => v && v !== def ? url.searchParams.set(k, v) : url.searchParams.delete(k);
  set('repo', state.repo);
  set('days', String(state.days), '14');
  set('exclude', state.excludePrefixes, DEFAULT_EXCLUDE_PREFIXES);
  window.history.replaceState(null, '', url.toString());
}

function parseExcludePrefixes(str) {
  return (str || '').split(',').map(s => s.trim()).filter(Boolean);
}
function isExcluded(name, prefixes) {
  return prefixes.some(p => name.startsWith(p));
}

const initialConfig = getInitialConfig();
let state = {
  token: '',
  repo: initialConfig.repo,
  days: initialConfig.days,
  excludePrefixes: initialConfig.excludePrefixes,
  data: null, tab: 'leaderboard', loading: false, error: null, loadingMsg: '',
  cacheStats: null, warnings: [],
  anonymized: false, anonMap: {},
  teams: [], enabledTeams: new Set(), teamsError: null, userTeamPreference: {},
};

function getWeekStart(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff)).toISOString().slice(0, 10);
}
function dayLabel(s) {
  return new Date(s+'T00:00:00').toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'});
}
function weekLabel(s) {
  const d = new Date(s+'T00:00:00');
  const e = new Date(d); e.setDate(e.getDate()+6);
  return d.toLocaleDateString('en',{month:'short',day:'numeric'})+' – '+e.toLocaleDateString('en',{month:'short',day:'numeric'});
}
function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff/60000);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins/60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs/24);
  return `${days}d ago`;
}
function shortSha(sha) { return sha?.slice(0,7) || ''; }

// ── Encrypted commit cache (AES-GCM key derived from token via PBKDF2) ──
// Commits are immutable by SHA, so we cache them indefinitely and use the
// last-fetch timestamp per branch to fetch only new commits incrementally.
const CACHE_PREFIX = 'arena_cache_v1_';
const SALT_KEY = 'arena_salt_v1';
const CACHE_MAX_AGE_DAYS = 90;
const TE = new TextEncoder();
const TD = new TextDecoder();
const b64enc = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
const b64dec = str => Uint8Array.from(atob(str), c => c.charCodeAt(0));

function getSalt() {
  let salt = localStorage.getItem(SALT_KEY);
  if (!salt) {
    salt = b64enc(crypto.getRandomValues(new Uint8Array(16)));
    localStorage.setItem(SALT_KEY, salt);
  }
  return b64dec(salt);
}

let keyCache = { token: null, key: null };
async function deriveKey(token) {
  if (keyCache.token === token && keyCache.key) return keyCache.key;
  const baseKey = await crypto.subtle.importKey(
    'raw', TE.encode(token), { name: 'PBKDF2' }, false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: getSalt(), iterations: 100000, hash: 'SHA-256' },
    baseKey, { name: 'AES-GCM', length: 256 }, false, ['encrypt','decrypt']
  );
  keyCache = { token, key };
  return key;
}

async function encryptJSON(obj, token) {
  const key = await deriveKey(token);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt(
    { name: 'AES-GCM', iv }, key, TE.encode(JSON.stringify(obj))
  );
  return { iv: b64enc(iv), ct: b64enc(ct) };
}
async function decryptJSON(blob, token) {
  const key = await deriveKey(token);
  const data = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: b64dec(blob.iv) }, key, b64dec(blob.ct)
  );
  return JSON.parse(TD.decode(data));
}

const cacheStorageKey = repo => CACHE_PREFIX + repo.replace(/[^\w.-]/g, '_');

async function loadCache(repo, token) {
  const raw = localStorage.getItem(cacheStorageKey(repo));
  if (!raw) return null;
  try { return await decryptJSON(JSON.parse(raw), token); }
  catch {
    // Wrong token or corrupt blob — drop it so we don't keep retrying.
    localStorage.removeItem(cacheStorageKey(repo));
    return null;
  }
}

async function saveCache(repo, token, data) {
  try {
    const blob = await encryptJSON(data, token);
    localStorage.setItem(cacheStorageKey(repo), JSON.stringify(blob));
  } catch (e) {
    console.warn('Cache save failed:', e);
  }
}

function pruneCache(cache) {
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - CACHE_MAX_AGE_DAYS);
  const keep = new Set();
  for (const [sha, c] of Object.entries(cache.commits)) {
    const d = c?.commit?.author?.date;
    if (!d || new Date(d) >= cutoff) keep.add(sha);
  }
  for (const sha of Object.keys(cache.commits)) {
    if (!keep.has(sha)) delete cache.commits[sha];
  }
  for (const info of Object.values(cache.branchSHAs)) {
    info.shas = info.shas.filter(sha => keep.has(sha));
  }
}

function clearAllCaches() {
  for (let i = localStorage.length - 1; i >= 0; i--) {
    const k = localStorage.key(i);
    if (k && (k.startsWith(CACHE_PREFIX) || k === SALT_KEY)) localStorage.removeItem(k);
  }
  keyCache = { token: null, key: null };
}

function avatarEl(login, size = 36) {
  const img = el('img', { src: `https://github.com/${login}.png?size=80`, className: size > 40 ? 'avatar lg' : 'avatar' });
  img.onerror = () => {
    const hues = [200,160,280,340,30,60,120];
    let h = 0; for (let i=0;i<login.length;i++) h = login.charCodeAt(i)+((h<<5)-h);
    const fb = el('div', { className: 'avatar-fallback', style: {
      width: size+'px', height: size+'px', fontSize: (size*0.45)+'px',
      background: `hsl(${hues[Math.abs(h)%hues.length]},70%,65%)`
    }}, login[0]?.toUpperCase());
    img.replaceWith(fb);
  };
  return img;
}

function userAvatarEl(login, size = 36) {
  if (state.anonymized) {
    const name = displayName(login) || '?';
    const hues = [200,160,280,340,30,60,120];
    let h = 0; for (let i=0;i<name.length;i++) h = name.charCodeAt(i)+((h<<5)-h);
    return el('div', { className: 'avatar-fallback' + (size > 40 ? ' lg' : ''), style: {
      width: size+'px', height: size+'px', fontSize: (size*0.45)+'px',
      background: `hsl(${hues[Math.abs(h)%hues.length]},70%,65%)`
    }}, name[0]?.toUpperCase() || '?');
  }
  return avatarEl(login, size);
}

class GitHubError extends Error {
  constructor(message, { status, resetAt, retryAfter } = {}) {
    super(message);
    this.status = status; this.resetAt = resetAt; this.retryAfter = retryAfter;
  }
}

function parseGitHubError(res) {
  const remaining = res.headers.get('x-ratelimit-remaining');
  const reset = res.headers.get('x-ratelimit-reset');
  const retryAfter = res.headers.get('retry-after');
  if (res.status === 403 && remaining === '0' && reset) {
    const resetAt = new Date(Number(reset) * 1000);
    const mins = Math.max(1, Math.ceil((resetAt - Date.now()) / 60000));
    return new GitHubError(
      `GitHub API rate limit exceeded. Resets in ~${mins} min (at ${resetAt.toLocaleTimeString()}).`,
      { status: 403, resetAt }
    );
  }
  if (res.status === 429) {
    const wait = retryAfter ? `${retryAfter}s` : 'a moment';
    return new GitHubError(`GitHub API secondary rate limit hit. Retry after ${wait}.`, { status: 429, retryAfter });
  }
  if (res.status === 401) return new GitHubError('GitHub API rejected the token (401). Check the token is valid and has repo scope.', { status: 401 });
  if (res.status === 404) return new GitHubError('Repository not found or token lacks access (404). Check the owner/repo and token scopes.', { status: 404 });
  return new GitHubError(`GitHub API ${res.status}: ${res.statusText}`, { status: res.status });
}

// Returns { items, truncated, stopped }. `truncated` means we hit the page cap;
// `stopped` means stopWhen fired (caller's predicate said no more pages needed).
async function fetchAllPages(url, token, { max = 10, stopWhen } = {}) {
  const items = [];
  let page = 1;
  let truncated = false, stopped = false;
  while (page <= max) {
    const sep = url.includes('?') ? '&' : '?';
    const res = await fetch(`${url}${sep}per_page=100&page=${page}`, {
      headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
    });
    if (!res.ok) throw parseGitHubError(res);
    const d = await res.json();
    if (!d.length) break;
    items.push(...d);
    if (stopWhen && d.some(stopWhen)) { stopped = true; break; }
    if (d.length < 100) break;
    if (page === max) { truncated = true; break; }
    page++;
  }
  return { items, truncated, stopped };
}

function isMergeMainCommit(msg) {
  const m = (msg||'').toLowerCase();
  return m.startsWith("merge branch 'main'")||m.startsWith('merge branch "main"')||
    m.startsWith("merge branch 'master'")||m.startsWith('merge branch "master"')||
    (m.startsWith('merge')&&/from .+\/(main|master)/i.test(m));
}

async function loadData() {
  state.loading = true; state.error = null; state.loadingMsg = 'Loading…';
  state.cacheStats = { fromCache: 0, fromApi: 0 };
  state.warnings = [];
  syncUrl();
  render();
  try {
    const since = new Date(); since.setDate(since.getDate() - state.days);
    const sinceISO = since.toISOString();
    const base = `https://api.github.com/repos/${state.repo}`;
    const excludePrefixes = parseExcludePrefixes(state.excludePrefixes);
    localStorage.setItem('arena_exclude_prefixes', state.excludePrefixes);

    state.loadingMsg = 'Loading cache…'; render();
    const cache = (await loadCache(state.repo, state.token)) || { commits: {}, branchSHAs: {} };

    state.loadingMsg = 'Fetching branches…'; render();
    const branchesRes = await fetchAllPages(`${base}/branches`, state.token, { max: 5 });
    if (branchesRes.truncated) state.warnings.push('Branch list exceeded 500 entries — only the first 500 were considered.');
    const branchNames = branchesRes.items.map(b => b.name).filter(n => !isExcluded(n, excludePrefixes));

    // 2. Fetch commits per branch (incremental). Commits are immutable by SHA,
    // so for branches we've seen before we only need commits since lastFetch.
    const commitMap = new Map();
    for (let i = 0; i < branchNames.length; i++) {
      const branch = branchNames[i];
      const cached = cache.branchSHAs[branch];

      let fetchSinceISO = sinceISO;
      const cachedInWindow = [];
      if (cached?.lastFetch && new Date(cached.lastFetch) > since) {
        // 1-minute overlap to avoid missing commits at the boundary.
        const overlap = new Date(cached.lastFetch); overlap.setMinutes(overlap.getMinutes() - 1);
        fetchSinceISO = overlap.toISOString();
        for (const sha of cached.shas) {
          const c = cache.commits[sha];
          const d = c?.commit?.author?.date;
          if (d && new Date(d) >= since) cachedInWindow.push(sha);
        }
      }

      state.loadingMsg = cached
        ? `Updating ${branch} (${i+1}/${branchNames.length}, ${cachedInWindow.length} cached)…`
        : `Fetching ${branch} (${i+1}/${branchNames.length})…`;
      render();

      const freshRes = await fetchAllPages(
        `${base}/commits?sha=${encodeURIComponent(branch)}&since=${fetchSinceISO}`, state.token, { max: 5 }
      );
      const fresh = freshRes.items;
      if (freshRes.truncated) state.warnings.push(`Branch "${branch}" had more than 500 commits in the window — counts may be incomplete.`);
      state.cacheStats.fromApi += fresh.length;
      state.cacheStats.fromCache += cachedInWindow.length;

      for (const c of fresh) cache.commits[c.sha] = c;

      const branchShas = new Set([...cachedInWindow, ...fresh.map(c => c.sha)]);
      cache.branchSHAs[branch] = {
        shas: [...new Set([...(cached?.shas || []), ...fresh.map(c => c.sha)])],
        lastFetch: new Date().toISOString(),
      };

      for (const sha of branchShas) {
        const c = cache.commits[sha];
        if (!c) continue;
        if (commitMap.has(sha)) {
          const entry = commitMap.get(sha);
          if (!entry.branches.includes(branch)) entry.branches.push(branch);
        } else {
          commitMap.set(sha, { commit: c, branches: [branch] });
        }
      }
    }
    const allCommitsRaw = [...commitMap.values()];

    pruneCache(cache);
    await saveCache(state.repo, state.token, cache);

    // 3. Fetch PRs and review comments. PRs are sorted updated-desc; once we
    // see one updated before `since`, every later page is older too — stop.
    state.loadingMsg = 'Fetching PRs & reviews…'; render();
    const [prsRes, reviewsRes] = await Promise.all([
      fetchAllPages(`${base}/pulls?state=closed&sort=updated&direction=desc`, state.token, {
        stopWhen: p => p.updated_at && new Date(p.updated_at) < since,
      }),
      fetchAllPages(`${base}/pulls/comments?since=${sinceISO}&sort=created&direction=desc`, state.token),
    ]);
    if (prsRes.truncated) state.warnings.push('Closed-PR list exceeded the page cap — older merged PRs may be missing.');
    if (reviewsRes.truncated) state.warnings.push('Review-comment list exceeded the page cap — counts may be incomplete.');

    // Fetch org teams (best-effort; needs read:org scope and an org owner).
    const [owner] = state.repo.split('/');
    const prevEnabledTeams = state.enabledTeams;
    state.teams = []; state.teamsError = null;
    if (owner) {
      state.loadingMsg = 'Fetching teams…'; render();
      try {
        const teamsRes = await fetchAllPages(`https://api.github.com/orgs/${owner}/teams`, state.token, { max: 5 });
        const teams = [];
        for (let i = 0; i < teamsRes.items.length; i++) {
          const t = teamsRes.items[i];
          state.loadingMsg = `Fetching team members (${i+1}/${teamsRes.items.length})…`; render();
          const membersRes = await fetchAllPages(`https://api.github.com/orgs/${owner}/teams/${t.slug}/members`, state.token, { max: 5 });
          teams.push({ slug: t.slug, name: t.name, members: new Set(membersRes.items.map(m => m.login)) });
        }
        state.teams = teams;
        const allSlugs = new Set(teams.map(t => t.slug));
        state.enabledTeams = prevEnabledTeams && prevEnabledTeams.size
          ? new Set([...prevEnabledTeams].filter(s => allSlugs.has(s)))
          : new Set();
      } catch (e) {
        state.teamsError = e.status === 404
          ? 'No teams found. The owner may be a user account, or the token lacks read:org scope.'
          : (e.message || 'Could not load teams.');
        state.enabledTeams = new Set();
      }
    }

    const filteredCommits = allCommitsRaw.filter(e => !isMergeMainCommit(e.commit.commit?.message));
    const mergedPRs = prsRes.items.filter(p => p.merged_at && new Date(p.merged_at) >= since && !isExcluded(p.base?.ref || '', excludePrefixes));
    const reviewComments = reviewsRes.items;

    // Build indexes
    const commitsByUD = {}, reviewsByUD = {}, prsByWeek = {}, prsByUW = {}, prsByUD = {};
    const userCommits = {}, userReviews = {}, userPRs = {};
    const rawCommitsByUD = {}, rawReviewsByUD = {}, rawPRsByUW = {}, rawPRsByUD = {};
    const rawCommitsByUser = {}, rawReviewsByUser = {}, rawPRsByUser = {};

    filteredCommits.forEach(e => {
      const c = e.commit;
      const login = c.author?.login || c.commit?.author?.name;
      const day = (c.commit?.author?.date||'').slice(0,10);
      if (!day || !login) return;
      const key = `${login}||${day}`;
      commitsByUD[key] = (commitsByUD[key]||0)+1;
      userCommits[login] = (userCommits[login]||0)+1;
      if (!rawCommitsByUD[key]) rawCommitsByUD[key] = [];
      rawCommitsByUD[key].push(e);
      if (!rawCommitsByUser[login]) rawCommitsByUser[login] = [];
      rawCommitsByUser[login].push(e);
    });

    reviewComments.forEach(r => {
      const login = r.user?.login;
      const day = (r.created_at||'').slice(0,10);
      if (!day || !login) return;
      const key = `${login}||${day}`;
      reviewsByUD[key] = (reviewsByUD[key]||0)+1;
      userReviews[login] = (userReviews[login]||0)+1;
      if (!rawReviewsByUD[key]) rawReviewsByUD[key] = [];
      rawReviewsByUD[key].push(r);
      if (!rawReviewsByUser[login]) rawReviewsByUser[login] = [];
      rawReviewsByUser[login].push(r);
    });

    mergedPRs.forEach(p => {
      const day = p.merged_at.slice(0,10);
      const week = getWeekStart(day);
      const login = p.user?.login;
      if (!login) return;
      prsByWeek[week] = (prsByWeek[week]||0)+1;
      const key = `${login}||${week}`;
      prsByUW[key] = (prsByUW[key]||0)+1;
      userPRs[login] = (userPRs[login]||0)+1;
      if (!rawPRsByUW[key]) rawPRsByUW[key] = [];
      rawPRsByUW[key].push(p);
      const dkey = `${login}||${day}`;
      prsByUD[dkey] = (prsByUD[dkey]||0)+1;
      if (!rawPRsByUD[dkey]) rawPRsByUD[dkey] = [];
      rawPRsByUD[dkey].push(p);
      if (!rawPRsByUser[login]) rawPRsByUser[login] = [];
      rawPRsByUser[login].push(p);
    });

    const today = new Date().toISOString().slice(0,10);
    const todayCommits = {}, todayReviews = {};
    Object.entries(commitsByUD).forEach(([k,v])=>{const [l,d]=k.split('||');if(d===today)todayCommits[l]=v;});
    Object.entries(reviewsByUD).forEach(([k,v])=>{const [l,d]=k.split('||');if(d===today)todayReviews[l]=v;});

    const allDays = [];
    const dd = new Date(since); const now = new Date();
    while (dd <= now) { allDays.push(dd.toISOString().slice(0,10)); dd.setDate(dd.getDate()+1); }
    const allWeeks = [...new Set(allDays.map(getWeekStart))].sort();
    const allUsers = [...new Set([...Object.keys(userCommits),...Object.keys(userReviews),...Object.keys(userPRs)])].sort();
    state.anonMap = buildAnonMap(allUsers);

    state.data = {
      commitsByUD, reviewsByUD, prsByWeek, prsByUW, prsByUD,
      userCommits, userReviews, userPRs,
      todayCommits, todayReviews,
      allDays, allWeeks, allUsers,
      totalCommits: filteredCommits.length,
      totalReviews: reviewComments.length,
      totalMergedPRs: mergedPRs.length,
      branchCount: branchNames.length,
      rawCommitsByUD, rawReviewsByUD, rawPRsByUW, rawPRsByUD,
      rawCommitsByUser, rawReviewsByUser, rawPRsByUser,
    };
    state.loading = false;
    render();
  } catch(e) {
    state.error = e.message; state.loading = false; state.data = null; render();
  }
}

function sorted(obj) { return Object.entries(obj).sort((a,b)=>b[1]-a[1]); }

// ── Drawer ──
function openDrawer(title, contentFn) {
  const root = $('#drawer-root');
  root.innerHTML = '';
  const overlay = el('div',{className:'drawer-overlay',onClick:closeDrawer});
  const drawer = el('div',{className:'drawer'});
  drawer.addEventListener('click', e => e.stopPropagation());

  const header = el('div',{className:'drawer-header'});
  header.append(el('h2',{},title));
  header.append(el('button',{className:'drawer-close',onClick:closeDrawer},'✕'));
  drawer.append(header);

  const body = el('div');
  contentFn(body);
  drawer.append(body);
  root.append(overlay, drawer);
  document.addEventListener('keydown', drawerEsc);
}
function closeDrawer() { $('#drawer-root').innerHTML = ''; document.removeEventListener('keydown', drawerEsc); }
function drawerEsc(e) { if (e.key === 'Escape') closeDrawer(); }

function renderCommitItems(container, items) {
  if (!items || !items.length) { container.append(el('div',{className:'drawer-empty'},'No commits found.')); return; }
  container.append(el('div',{className:'drawer-count'},`${items.length} commit${items.length!==1?'s':''}`));
  items.forEach(entry => {
    const c = entry.commit;
    const msg = c.commit?.message || '';
    const firstLine = msg.split('\n')[0];
    const rest = msg.split('\n').slice(1).join('\n').trim();
    const item = el('div',{className:'commit-item'});

    const titleRow = el('div',{className:'item-title'});
    titleRow.append(el('span',{className:'item-sha'},shortSha(c.sha)));
    titleRow.append(el('a',{href:c.html_url}, firstLine));
    item.append(titleRow);

    const meta = el('div',{className:'item-meta'});
    const authorKey = c.author?.login || c.commit?.author?.name;
    meta.append(el('span',{}, displayName(authorKey) || 'unknown'));
    meta.append(el('span',{},timeAgo(c.commit?.author?.date)));
    entry.branches.slice(0,3).forEach(b => meta.append(el('span',{className:'branch-tag'},b)));
    if (entry.branches.length > 3) meta.append(el('span',{className:'branch-tag'},`+${entry.branches.length-3}`));
    item.append(meta);

    if (rest) item.append(el('div',{className:'item-body'},rest));
    container.append(item);
  });
}

function renderReviewItems(container, items) {
  if (!items || !items.length) { container.append(el('div',{className:'drawer-empty'},'No review comments found.')); return; }
  container.append(el('div',{className:'drawer-count'},`${items.length} review comment${items.length!==1?'s':''}`));
  items.forEach(r => {
    const item = el('div',{className:'review-item'});
    const titleRow = el('div',{className:'item-title'});
    titleRow.append(el('a',{href:r.html_url}, `${displayName(r.user?.login) || 'unknown'} on ${r.path||'file'}:${r.original_line||r.line||''}`));
    item.append(titleRow);

    const meta = el('div',{className:'item-meta'});
    meta.append(el('span',{},timeAgo(r.created_at)));
    if(r.path) meta.append(el('span',{style:{color:'var(--text-muted)'}},r.path));
    item.append(meta);

    if (r.body) item.append(el('div',{className:'item-body'},r.body));
    container.append(item);
  });
}

function renderPRItems(container, items) {
  if (!items || !items.length) { container.append(el('div',{className:'drawer-empty'},'No merged PRs found.')); return; }
  container.append(el('div',{className:'drawer-count'},`${items.length} merged PR${items.length!==1?'s':''}`));
  items.forEach(p => {
    const item = el('div',{className:'pr-item'});
    const titleRow = el('div',{className:'item-title'});
    titleRow.append(el('span',{className:'pr-state merged'},'merged'));
    titleRow.append(el('a',{href:p.html_url}, `#${p.number} ${p.title}`));
    item.append(titleRow);

    const meta = el('div',{className:'item-meta'});
    meta.append(el('span',{}, displayName(p.user?.login) || 'unknown'));
    meta.append(el('span',{},`merged ${timeAgo(p.merged_at)}`));
    if(p.additions!=null) meta.append(el('span',{style:{color:'var(--green)'}},`+${p.additions}`));
    if(p.deletions!=null) meta.append(el('span',{style:{color:'var(--red)'}},`-${p.deletions}`));
    item.append(meta);

    if (p.body) {
      const body = p.body.length > 200 ? p.body.slice(0,200)+'…' : p.body;
      item.append(el('div',{className:'item-body'},body));
    }
    container.append(item);
  });
}

function renderTeamDayDrawer(container, team, day, userAssignment) {
  const d = state.data;
  const commits = [], reviews = [], prs = [];
  team.members.forEach(login => {
    if (userAssignment && userAssignment[login] !== team.slug) return;
    const k = `${login}||${day}`;
    if (d.rawCommitsByUD[k]) commits.push(...d.rawCommitsByUD[k]);
    if (d.rawReviewsByUD[k]) reviews.push(...d.rawReviewsByUD[k]);
    if (d.rawPRsByUD[k]) prs.push(...d.rawPRsByUD[k]);
  });
  if (!commits.length && !reviews.length && !prs.length) {
    container.append(el('div',{className:'drawer-empty'},'No activity found for this team on this day.'));
    return;
  }
  const sectionH = (color, text) => el('h3',{style:{fontSize:'13px',fontWeight:'700',color,margin:'16px 0 6px'}}, text);
  if (commits.length) { container.append(sectionH('var(--accent)', '⚡ Commits')); renderCommitItems(container, commits); }
  if (reviews.length) { container.append(sectionH('var(--purple)', '💬 Review Comments')); renderReviewItems(container, reviews); }
  if (prs.length)     { container.append(sectionH('var(--green)',  '🚀 Merged PRs'));     renderPRItems(container, prs); }
}

function leaderCard(rank, login, value, label, unitLabel, color, glowColor, onFire, onClick) {
  const isTop = rank === 0;
  const card = el('div',{className:'leader-card'+(isTop?' top':''),style:{'--card-color':color},onClick});
  if(isTop) {
    card.style.background = `linear-gradient(135deg, var(--surface), ${glowColor})`;
    card.style.boxShadow = `0 0 30px ${glowColor}`;
  }
  card.onmouseenter = ()=>{card.style.boxShadow=`0 8px 24px ${glowColor}`;};
  card.onmouseleave = ()=>{card.style.boxShadow=isTop?`0 0 30px ${glowColor}`:'none';};

  card.append(el('div',{className:'rank'},MEDAL[rank]||`#${rank+1}`), userAvatarEl(login, isTop?44:36));
  const info = el('div',{className:'info'});
  const nameEl = el('div',{className:'name'}, displayName(login));
  if(onFire) nameEl.append(el('span',{title:'On fire!',style:{fontSize:'16px'}},' 🔥'));
  info.append(nameEl, el('div',{className:'detail'},label));
  card.append(info);

  const score = el('div',{className:'score'});
  score.append(el('div',{className:'num',style:{color}},String(value)), el('div',{className:'unit'},unitLabel));
  card.append(score);
  return card;
}

function renderHeatTable(dataMap, rawDataMap, days, leaders, color, colorRGB, type) {
  const wrap = el('div',{style:{overflowX:'auto'}});
  const table = el('table');
  const thead = el('thead');
  const hrow = el('tr');
  hrow.append(el('th',{},'User'));
  days.forEach(d=>hrow.append(el('th',{},dayLabel(d))));
  hrow.append(el('th',{className:'total-col'},'Total'));
  thead.append(hrow); table.append(thead);

  const tbody = el('tbody');
  leaders.forEach(([login, total])=>{
    const tr = el('tr');
    const uCell = el('td');
    const uw = el('div',{className:'user-cell'});
    uw.append(userAvatarEl(login,22), el('span',{}, displayName(login)));
    uCell.append(uw); tr.append(uCell);

    days.forEach(d=>{
      const key = `${login}||${d}`;
      const v = dataMap[key]||0;
      const intensity = Math.min(v/8,1);
      const td = el('td',{
        className: v > 0 ? 'clickable' : '',
        style:{
          background: v>0?`rgba(${colorRGB},${(0.08+intensity*0.35).toFixed(2)})`:'transparent',
          color: v>0?color:'var(--text-dim)',
          fontWeight: v>0?'700':'400',
        },
      }, v||'·');
      if (v > 0) {
        td.addEventListener('click', () => {
          const items = rawDataMap[key] || [];
          const title = `${displayName(login)} — ${dayLabel(d)}`;
          openDrawer(title, body => {
            if (type === 'commits') renderCommitItems(body, items);
            else renderReviewItems(body, items);
          });
        });
      }
      tr.append(td);
    });
    tr.append(el('td',{className:'total-col'},String(total)));
    tbody.append(tr);
  });
  table.append(tbody); wrap.append(table);
  return wrap;
}

    el('div',{className:'trophy'},'🏆'),

function renderDashboard() {
  const app = $('#app');
  app.innerHTML = '';
  const d = state.data;
  const dash = el('div',{className:'dashboard'});

  const header = el('div',{className:'dash-header'});
  const hLeft = el('div');
  const cs = state.cacheStats;
  const cacheNote = cs && cs.fromCache > 0
    ? ` · ♻ ${cs.fromCache} cached, ${cs.fromApi} fetched`
    : (cs ? ` · ${cs.fromApi} fetched` : '');
  hLeft.append(el('h1',{},'🏆 Team Arena'), el('div',{className:'sub'},`${state.repo} · Last ${state.days} days · ${d.branchCount} branches${cacheNote}`));
  header.append(hLeft);
  const actions = el('div',{className:'header-actions'});
  actions.append(
    el('button',{
      className:'back-btn'+(state.anonymized?' anon-active':''),
      onClick:()=>{state.anonymized=!state.anonymized;closeDrawer();renderDashboard();},
      title: state.anonymized ? 'Show real names and avatars' : 'Hide real names and avatars',
    }, state.anonymized ? '👁 Reveal' : '🎭 Anonymize'),
    el('button',{className:'back-btn',onClick:loadData,title:'Re-fetch from GitHub'},'↻ Refresh'),
    el('button',{className:'back-btn',onClick:()=>{state.data=null;state.error=null;render();}},'← Back'),
  );
  header.append(actions);
  dash.append(header);

  if (state.warnings && state.warnings.length) {
    const banner = el('div',{className:'warning-banner'});
    banner.append(el('div',{className:'warn-title'},'⚠ Partial results'));
    const ul = el('ul');
    state.warnings.forEach(w => ul.append(el('li',{},w)));
    banner.append(ul);
    dash.append(banner);
  }

  const ribbon = el('div',{className:'stats-ribbon'});
  [{i:'⚡',v:d.totalCommits,l:'Commits',c:'var(--accent)'},{i:'💬',v:d.totalReviews,l:'Review Comments',c:'var(--purple)'},
   {i:'🚀',v:d.totalMergedPRs,l:'Merged PRs',c:'var(--green)'},{i:'👥',v:d.allUsers.length,l:'Contributors',c:'var(--gold)'}
  ].forEach(s=>{
    const b = el('div',{className:'stat-badge'});
    b.append(el('div',{className:'icon'},s.i),el('div',{className:'val',style:{color:s.c}},String(s.v)),el('div',{className:'lbl'},s.l));
    ribbon.append(b);
  });
  dash.append(ribbon);

  const tabs = el('div',{className:'tabs'});
  [{k:'leaderboard',l:'🏅 Leaderboard'},{k:'commits',l:'⚡ Commits'},{k:'reviews',l:'💬 Reviews'},{k:'prs',l:'🚀 PRs'},{k:'teams',l:'👥 Teams'}].forEach(t=>{
    tabs.append(el('button',{className:'tab-btn'+(state.tab===t.k?' active':''),onClick:()=>{state.tab=t.k;renderDashboard();}},t.l));
  });
  dash.append(tabs);

  const content = el('div',{className:'tab-content'});

  // ── LEADERBOARD ──
  if (state.tab === 'leaderboard') {
    const grid = el('div',{className:'leaders-grid'});

    const sec1 = el('div',{className:'leader-section'});
    sec1.append(el('h3',{style:{color:'var(--accent)'},innerHTML:'⚡ Commit Kings'}));
    const cl = sorted(d.userCommits);
    if(!cl.length) sec1.append(el('p',{className:'empty'},'No commits yet'));
    cl.slice(0,5).forEach(([login,v],i)=>{
      sec1.append(leaderCard(i,login,v,`${v} commit${v!==1?'s':''} in ${state.days}d`,'commits','var(--accent)','var(--accent-glow)',
        (d.todayCommits[login]||0)>=FIRE.commits,
        ()=>openDrawer(`⚡ ${displayName(login)} — All Commits`, body=>renderCommitItems(body, d.rawCommitsByUser[login]))
      ));
    });
    grid.append(sec1);

    const sec2 = el('div',{className:'leader-section'});
    sec2.append(el('h3',{style:{color:'var(--purple)'},innerHTML:'💬 Review Champions'}));
    const rl = sorted(d.userReviews);
    if(!rl.length) sec2.append(el('p',{className:'empty'},'No reviews yet'));
    rl.slice(0,5).forEach(([login,v],i)=>{
      sec2.append(leaderCard(i,login,v,`${v} review comment${v!==1?'s':''}`,'reviews','var(--purple)','var(--purple-glow)',
        (d.todayReviews[login]||0)>=FIRE.reviews,
        ()=>openDrawer(`💬 ${displayName(login)} — All Reviews`, body=>renderReviewItems(body, d.rawReviewsByUser[login]))
      ));
    });
    grid.append(sec2);

    const sec3 = el('div',{className:'leader-section'});
    sec3.append(el('h3',{style:{color:'var(--green)'},innerHTML:'🚀 Merge Masters'}));
    const pl = sorted(d.userPRs);
    if(!pl.length) sec3.append(el('p',{className:'empty'},'No merged PRs yet'));
    pl.slice(0,5).forEach(([login,v],i)=>{
      sec3.append(leaderCard(i,login,v,`${v} merged PR${v!==1?'s':''}`,'prs','var(--green)','var(--green-glow)',false,
        ()=>openDrawer(`🚀 ${displayName(login)} — Merged PRs`, body=>renderPRItems(body, d.rawPRsByUser[login]))
      ));
    });
    grid.append(sec3);

    content.append(grid);
  }

  // ── COMMITS TABLE ──
  if (state.tab === 'commits') {
    content.append(el('h3',{style:{fontSize:'14px',fontWeight:'700',color:'var(--accent)',margin:'0 0 4px'}},'⚡ Commits per User per Day'));
    content.append(el('p',{style:{fontSize:'11px',color:'var(--text-dim)',margin:'0 0 14px'}},'Click any highlighted cell to see the commits'));
    content.append(renderHeatTable(d.commitsByUD, d.rawCommitsByUD, d.allDays, sorted(d.userCommits), 'var(--accent)', '56,189,248', 'commits'));
  }

  // ── REVIEWS TABLE ──
  if (state.tab === 'reviews') {
    content.append(el('h3',{style:{fontSize:'14px',fontWeight:'700',color:'var(--purple)',margin:'0 0 4px'}},'💬 Review Comments per User per Day'));
    content.append(el('p',{style:{fontSize:'11px',color:'var(--text-dim)',margin:'0 0 14px'}},'Click any highlighted cell to see the comments'));
    content.append(renderHeatTable(d.reviewsByUD, d.rawReviewsByUD, d.allDays, sorted(d.userReviews), 'var(--purple)', '167,139,250', 'reviews'));
  }

  // ── PRS TAB ──
  if (state.tab === 'prs') {
    content.append(el('h3',{style:{fontSize:'14px',fontWeight:'700',color:'var(--green)',margin:'0 0 14px'}},'🚀 Merged PRs per Week'));

    const max = Math.max(...d.allWeeks.map(w=>d.prsByWeek[w]||0), 1);
    const chart = el('div',{className:'bar-chart'});
    d.allWeeks.forEach(w=>{
      const v = d.prsByWeek[w]||0;
      const row = el('div',{className:'bar-row'});
      row.append(el('div',{className:'bar-label'},weekLabel(w)));
      const track = el('div',{className:'bar-track'});
      const fill = el('div',{className:'bar-fill',style:{width:`${(v/max)*100}%`,background:`linear-gradient(90deg, rgba(52,211,153,0.5), var(--green))`,minWidth:v>0?'2px':'0'}});
      const val = el('span',{className:'bar-val',style:{color:v/max>0.5?'#fff':'var(--text-muted)'}},String(v));
      track.append(fill,val);
      row.append(track);
      chart.append(row);
    });
    content.append(chart);

    content.append(el('h3',{style:{fontSize:'14px',fontWeight:'700',color:'var(--green)',margin:'0 0 4px'}},'Per-User Breakdown'));
    content.append(el('p',{style:{fontSize:'11px',color:'var(--text-dim)',margin:'0 0 14px'}},'Click any highlighted cell to see the PRs'));

    const wrap = el('div',{style:{overflowX:'auto'}});
    const table = el('table');
    const thead = el('thead'); const hrow = el('tr');
    hrow.append(el('th',{},'User'));
    d.allWeeks.forEach(w=>hrow.append(el('th',{},weekLabel(w))));
    hrow.append(el('th',{className:'total-col'},'Total'));
    thead.append(hrow); table.append(thead);

    const tbody = el('tbody');
    sorted(d.userPRs).forEach(([login,total])=>{
      const tr = el('tr');
      const uCell = el('td');
      const uw = el('div',{className:'user-cell'});
      uw.append(userAvatarEl(login,22),el('span',{}, displayName(login)));
      uCell.append(uw); tr.append(uCell);
      d.allWeeks.forEach(w=>{
        const key = `${login}||${w}`;
        const v = d.prsByUW[key]||0;
        const td = el('td',{
          className: v>0?'clickable':'',
          style:{
            background:v>0?`rgba(52,211,153,${(0.1+Math.min(v/5,1)*0.3).toFixed(2)})`:'transparent',
            color:v>0?'var(--green)':'var(--text-dim)',fontWeight:v>0?'700':'400',
          }
        },v||'·');
        if (v > 0) {
          td.addEventListener('click', () => {
            openDrawer(`🚀 ${displayName(login)} — ${weekLabel(w)}`, body => renderPRItems(body, d.rawPRsByUW[key]));
          });
        }
        tr.append(td);
      });
      tr.append(el('td',{className:'total-col'},String(total)));
      tbody.append(tr);
    });
    table.append(tbody); wrap.append(table);
    content.append(wrap);
  }

  // ── TEAMS TAB ──
  if (state.tab === 'teams') {
    content.append(el('h3',{style:{fontSize:'14px',fontWeight:'700',color:'var(--gold)',margin:'0 0 4px'}},'👥 Team Output per Day'));
    content.append(el('p',{style:{fontSize:'11px',color:'var(--text-dim)',margin:'0 0 14px'}},'Toggle teams to filter. Each cell sums commits + review comments + merged PRs for that team-day. Click any highlighted cell for the breakdown.'));

    if (state.teamsError) {
      content.append(el('div',{className:'error-box'},state.teamsError));
    } else if (!state.teams.length) {
      content.append(el('p',{className:'empty'},'No teams found for this repository owner.'));
    } else {
      const chipBar = el('div',{style:{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'16px'}});
      const mkChip = (label, onClick, active = false, mute = false) => el('button',{
        className:'day-btn'+(active?' active':''),
        style:{flex:'0 0 auto',padding:'6px 12px',fontSize:'12px',opacity:mute?'0.75':'1'},
        onClick,
      }, label);
      chipBar.append(mkChip('All', ()=>{state.enabledTeams=new Set(state.teams.map(t=>t.slug));renderDashboard();}, false, true));
      chipBar.append(mkChip('None', ()=>{state.enabledTeams=new Set();renderDashboard();}, false, true));
      state.teams.forEach(t => {
        const active = state.enabledTeams.has(t.slug);
        chipBar.append(mkChip(`${t.name} (${t.members.size})`, ()=>{
          if (active) state.enabledTeams.delete(t.slug); else state.enabledTeams.add(t.slug);
          renderDashboard();
        }, active));
      });
      content.append(chipBar);

      const enabledTeams = state.teams.filter(t => state.enabledTeams.has(t.slug));
      if (!enabledTeams.length) {
        content.append(el('p',{className:'empty'},'No teams selected — toggle a team above to see output.'));
      } else {
        // Build login -> [enabled teams the user belongs to]
        const userTeams = {};
        enabledTeams.forEach(t => {
          t.members.forEach(login => {
            if (!userTeams[login]) userTeams[login] = [];
            userTeams[login].push(t);
          });
        });

        // Resolve each user to exactly one team (preference if set, else first alphabetically).
        const userAssignment = {};
        Object.entries(userTeams).forEach(([login, teams]) => {
          if (teams.length === 1) { userAssignment[login] = teams[0].slug; return; }
          const pref = state.userTeamPreference[login];
          if (pref && teams.some(t => t.slug === pref)) { userAssignment[login] = pref; return; }
          userAssignment[login] = [...teams].sort((a,b)=>a.name.localeCompare(b.name))[0].slug;
        });

        // Conflict panel — only users in 2+ enabled teams who have activity in the window.
        const conflicts = Object.entries(userTeams)
          .filter(([login, teams]) => teams.length > 1)
          .filter(([login]) => (d.userCommits[login]||0) + (d.userReviews[login]||0) + (d.userPRs[login]||0) > 0)
          .sort((a,b) => a[0].localeCompare(b[0]));
        if (conflicts.length) {
          const panel = el('div',{style:{
            background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'12px',
            padding:'12px 14px', marginBottom:'16px',
          }});
          panel.append(el('div',{style:{
            fontSize:'12px', fontWeight:'700', color:'var(--text-muted)', marginBottom:'4px',
          }}, `Multi-team users (${conflicts.length}) — pick which team counts each`));
          conflicts.forEach(([login, teams]) => {
            const row = el('div',{style:{
              display:'flex', alignItems:'center', gap:'8px', flexWrap:'wrap',
              padding:'8px 0', borderTop:'1px solid var(--border)',
            }});
            const userBox = el('div',{style:{display:'flex',alignItems:'center',gap:'6px',minWidth:'160px',flex:'0 0 auto'}});
            userBox.append(userAvatarEl(login, 22), el('span',{style:{fontSize:'12px',fontWeight:'600'}}, displayName(login)));
            row.append(userBox);
            teams.forEach(t => {
              const active = userAssignment[login] === t.slug;
              row.append(el('button',{
                className:'day-btn'+(active?' active':''),
                style:{flex:'0 0 auto',padding:'4px 10px',fontSize:'11px'},
                onClick:()=>{ state.userTeamPreference[login] = t.slug; renderDashboard(); },
              }, t.name));
            });
            panel.append(row);
          });
          content.append(panel);
        }

        const teamCellByTD = {};
        const teamTotals = {};
        enabledTeams.forEach(t => {
          let teamTotal = 0;
          d.allDays.forEach(day => {
            let cc = 0, rc = 0, pc = 0;
            t.members.forEach(login => {
              if (userAssignment[login] !== t.slug) return;
              cc += d.commitsByUD[`${login}||${day}`] || 0;
              rc += d.reviewsByUD[`${login}||${day}`] || 0;
              pc += d.prsByUD[`${login}||${day}`] || 0;
            });
            const total = cc + rc + pc;
            teamCellByTD[`${t.slug}||${day}`] = { commits: cc, reviews: rc, prs: pc, total };
            teamTotal += total;
          });
          teamTotals[t.slug] = teamTotal;
        });

        const dayTotals = {};
        d.allDays.forEach(day => {
          let dt = 0;
          enabledTeams.forEach(t => { dt += teamCellByTD[`${t.slug}||${day}`].total; });
          dayTotals[day] = dt;
        });

        const sortedTeams = [...enabledTeams].sort((a,b) => (teamTotals[b.slug]||0) - (teamTotals[a.slug]||0));

        const wrap = el('div',{style:{overflowX:'auto'}});
        const table = el('table');
        const thead = el('thead'); const hrow = el('tr');
        hrow.append(el('th',{},'Team'));
        d.allDays.forEach(day => hrow.append(el('th',{},dayLabel(day))));
        hrow.append(el('th',{className:'total-col'},'Total'));
        thead.append(hrow); table.append(thead);

        const tbody = el('tbody');
        sortedTeams.forEach(t => {
          const tr = el('tr');
          const uCell = el('td');
          uCell.append(el('span',{style:{fontWeight:'700'}}, t.name));
          tr.append(uCell);
          d.allDays.forEach(day => {
            const cell = teamCellByTD[`${t.slug}||${day}`];
            const v = cell.total;
            const dt = dayTotals[day] || 0;
            const pct = dt > 0 ? Math.round((v / dt) * 100) : 0;
            const intensity = Math.min(v/15,1);
            const td = el('td',{
              className: v > 0 ? 'clickable' : '',
              title: v > 0 ? `${cell.commits} commits · ${cell.reviews} reviews · ${cell.prs} merged PRs (${pct}% of day total ${dt})` : '',
              style:{
                background: v>0?`rgba(251,191,36,${(0.08+intensity*0.35).toFixed(2)})`:'transparent',
                color: v>0?'var(--gold)':'var(--text-dim)',
                fontWeight: v>0?'700':'400',
              },
            });
            if (v > 0) {
              td.append(
                el('div',{style:{lineHeight:'1.1'}}, String(v)),
                el('div',{style:{fontSize:'9px',fontWeight:'500',opacity:'0.65',marginTop:'1px'}}, `${pct}%`),
              );
              td.addEventListener('click', () => {
                openDrawer(`👥 ${t.name} — ${dayLabel(day)}`, body => renderTeamDayDrawer(body, t, day, userAssignment));
              });
            } else {
              td.append('·');
            }
            tr.append(td);
          });
          tr.append(el('td',{className:'total-col'}, String(teamTotals[t.slug] || 0)));
          tbody.append(tr);
        });
        table.append(tbody); wrap.append(table);
        content.append(wrap);
      }
    }
  }

  dash.append(content);
  app.append(dash);
}

function render() {
  if (state.loading) return renderLoading();
  if (!state.data) return renderSetup();
  renderDashboard();
}

render();
</script>
</body>
</html>
